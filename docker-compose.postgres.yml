services:
  postgres:
    image: postgres:16-alpine
    container_name: gymflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gymflow_admin
      POSTGRES_PASSWORD: gymflow_admin_password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - gymflow-postgres-data:/var/lib/postgresql/data
      - ./backend/db/init-local.sql:/docker-entrypoint-initdb.d/001-init-local.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymflow_admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gymflow-postgres-data:
